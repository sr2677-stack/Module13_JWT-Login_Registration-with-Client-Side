<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | JWT Auth</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        max-width: 420px;
        margin: 3rem auto;
        padding: 1rem;
      }
      form {
        display: grid;
        gap: 0.75rem;
      }
      input,
      button {
        padding: 0.65rem;
        font-size: 1rem;
      }
      .error {
        color: #b00020;
        min-height: 1.25rem;
      }
      .success {
        color: #0b7a24;
        min-height: 1.25rem;
      }
    </style>
  </head>
  <body>
    <h1>Login</h1>
    <form id="loginForm">
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>

    <p id="error" class="error"></p>
    <p id="success" class="success"></p>
    <p><a href="/register.html">Need an account? Register</a></p>

    <script>
      const form = document.getElementById("loginForm");
      const errorEl = document.getElementById("error");
      const successEl = document.getElementById("success");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.textContent = "";
        successEl.textContent = "";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (!email || !password) {
          errorEl.textContent = "Email and password are required.";
          return;
        }

        try {
          const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();
          if (!response.ok) {
            errorEl.textContent = data.detail || "Invalid credentials.";
            return;
          }

          localStorage.setItem("jwt_token", data.access_token);
          successEl.textContent = "Login successful.";
        } catch (error) {
          errorEl.textContent = "Unable to connect to server.";
        }
      });
    </script>
  </body>
</html>
